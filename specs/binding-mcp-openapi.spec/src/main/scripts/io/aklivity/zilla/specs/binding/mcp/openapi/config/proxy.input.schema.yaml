---
name: test
catalogs:
  catalog0:
    type: inline
    options:
      subjects:
        github:
          version: latest
          schema: |
            {
              "openapi": "3.1.0",
              "info": { "title": "GitHub", "version": "1.0.0" },
              "servers": [ { "url": "https://api.github.com" } ],
              "paths": {
                "/repos/{owner}/{repo}/pulls": {
                  "post": {
                    "operationId": "create_pr",
                    "summary": "Create a pull request",
                    "parameters": [
                      { "name": "owner", "in": "path", "required": true, "schema": { "type": "string" } },
                      { "name": "repo", "in": "path", "required": true, "schema": { "type": "string" } }
                    ],
                    "responses": {
                      "201": {
                        "description": "created",
                        "content": {
                          "application/json": {
                            "schema": {
                              "type": "object",
                              "properties": {
                                "number": { "type": "integer" }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
bindings:
  app0:
    type: mcp_openapi
    kind: client
    options:
      specs:
        github:
          catalog:
            catalog0:
              subject: github
              version: latest
      tools:
        create_pr:
          description: Create a pull request to merge one branch into another.
          input:
            model: test
    routes:
      - when:
          - tool: create_pr
        with:
          spec: github
          operation: create_pr
          params:
            owner: ${args.repository.owner}
            repo: ${args.repository.name}
