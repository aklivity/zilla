---
name: test
catalogs:
  catalog0:
    type: inline
    options:
      subjects:
        github:
          version: latest
          schema: |
            {
              "openapi": "3.1.0",
              "info": { "title": "GitHub", "version": "1.0.0" },
              "servers": [ { "url": "https://api.github.com" } ],
              "paths": {
                "/items": {
                  "get": {
                    "operationId": "search_items",
                    "summary": "Search items",
                    "parameters": [
                      { "name": "q", "in": "query", "required": true, "schema": { "type": "string" } },
                      { "name": "limit", "in": "query", "schema": { "type": "integer" } }
                    ],
                    "responses": {
                      "200": {
                        "description": "ok",
                        "content": {
                          "application/json": {
                            "schema": {
                              "type": "object",
                              "properties": {
                                "items": { "type": "array", "items": { "type": "string" } }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
bindings:
  app0:
    type: mcp_openapi
    kind: client
    options:
      specs:
        github:
          catalog:
            catalog0:
              subject: github
              version: latest
    routes:
      - when:
          - tool: search_items
        with:
          spec: github
          operation: search_items
