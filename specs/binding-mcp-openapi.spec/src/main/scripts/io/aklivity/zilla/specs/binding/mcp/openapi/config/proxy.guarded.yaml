---
name: test
guards:
  test0:
    type: test
    options:
      roles:
        - pr:write
catalogs:
  catalog0:
    type: inline
    options:
      subjects:
        github:
          version: latest
          schema: |
            {
              "openapi": "3.1.0",
              "info": { "title": "GitHub", "version": "1.0.0" },
              "servers": [ { "url": "https://api.github.com" } ],
              "components": {
                "securitySchemes": {
                  "bearerAuth": { "type": "http", "scheme": "bearer", "bearerFormat": "jwt" }
                }
              },
              "paths": {
                "/repos/{owner}/{repo}/pulls": {
                  "post": {
                    "operationId": "create_pr",
                    "summary": "Create a pull request",
                    "security": [ { "bearerAuth": [ "pr:write" ] } ],
                    "parameters": [
                      { "name": "owner", "in": "path", "required": true, "schema": { "type": "string" } },
                      { "name": "repo", "in": "path", "required": true, "schema": { "type": "string" } }
                    ],
                    "requestBody": {
                      "required": true,
                      "content": {
                        "application/json": {
                          "schema": {
                            "type": "object",
                            "required": [ "title", "head", "base" ],
                            "properties": {
                              "title": { "type": "string" },
                              "head": { "type": "string" },
                              "base": { "type": "string" },
                              "body": { "type": "string" }
                            }
                          }
                        }
                      }
                    },
                    "responses": {
                      "201": {
                        "description": "created",
                        "content": {
                          "application/json": {
                            "schema": {
                              "type": "object",
                              "properties": {
                                "number": { "type": "integer" },
                                "html_url": { "type": "string" },
                                "state": { "type": "string" },
                                "title": { "type": "string" }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                },
                "/orders/{orderId}": {
                  "get": {
                    "operationId": "read_order",
                    "summary": "Read an order",
                    "parameters": [
                      { "name": "orderId", "in": "path", "required": true, "schema": { "type": "string" } }
                    ],
                    "responses": {
                      "200": {
                        "description": "ok",
                        "content": {
                          "application/json": {
                            "schema": {
                              "type": "object",
                              "properties": {
                                "id": { "type": "string" },
                                "status": { "type": "string" }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                },
                "/search/code": {
                  "get": {
                    "operationId": "search_code",
                    "summary": "Search for code",
                    "security": [ { "bearerAuth": [ "code:read" ] } ],
                    "parameters": [
                      { "name": "q", "in": "query", "required": true, "schema": { "type": "string" } }
                    ],
                    "responses": {
                      "200": {
                        "description": "ok",
                        "content": {
                          "application/json": {
                            "schema": {
                              "type": "object",
                              "properties": {
                                "total_count": { "type": "integer" }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
bindings:
  app0:
    type: mcp_openapi
    kind: client
    options:
      specs:
        github:
          catalog:
            catalog0:
              subject: github
              version: latest
          security:
            bearerAuth: test0
      tools:
        create_pr:
          description: Create a pull request to merge one branch into another.
    routes:
      - when:
          - tool: create_pr
        with:
          spec: github
          operation: create_pr
      - when:
          - resource: read_order
        with:
          spec: github
          operation: read_order
      - when:
          - tool: search_code
        with:
          spec: github
          operation: search_code
