---
name: test
catalogs:
  catalog0:
    type: inline
    options:
      subjects:
        github:
          version: latest
          schema: |
            {
              "openapi": "3.1.0",
              "info": { "title": "GitHub", "version": "1.0.0" },
              "servers": [ { "url": "https://api.github.com" } ],
              "paths": {
                "/greet": {
                  "post": {
                    "operationId": "greet",
                    "summary": "Greet",
                    "parameters": [
                      { "name": "session", "in": "cookie", "schema": { "type": "string" } },
                      { "name": "locale", "in": "cookie", "schema": { "type": "string" } }
                    ],
                    "requestBody": {
                      "required": true,
                      "content": {
                        "application/json": {
                          "schema": {
                            "type": "object",
                            "required": [ "message" ],
                            "properties": {
                              "message": { "type": "string" }
                            }
                          }
                        }
                      }
                    },
                    "responses": {
                      "200": {
                        "description": "ok",
                        "content": {
                          "application/json": {
                            "schema": {
                              "type": "object",
                              "properties": {
                                "status": { "type": "string" }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
        greet_input:
          version: latest
          schema: |
            {
              "type": "object",
              "properties": {
                "auth": {
                  "type": "object",
                  "properties": {
                    "token": { "type": "string" }
                  }
                },
                "locale": { "type": "string" },
                "message": { "type": "string" }
              },
              "required": [ "message" ]
            }
bindings:
  app0:
    type: mcp_openapi
    kind: client
    options:
      specs:
        github:
          catalog:
            catalog0:
              subject: github
              version: latest
      tools:
        greet:
          schemas:
            input:
              model: json
              catalog:
                catalog0:
                  - subject: greet_input
                    version: latest
    routes:
      - when:
          - tool: greet
        with:
          spec: github
          operation: greet
          params:
            session: ${args.auth.token}
