---
name: test
stores:
  store0:
    type: test
    options:
      entries:
        tools.lock: "worker-0"
bindings:
  app0:
    type: mcp
    kind: proxy
    options:
      cache:
        store: store0
        ttl:
          tools: PT1S
          resources: PT1S
          prompts: PT1S
    routes:
      - exit: app1
