---
name: test
guards:
  oauth:
    type: test
    options:
      preauthorize: "https://server.example.com/authorize?state=7f3a9b1c&redirect_uri=https%3A%2F%2Freplace.me%2Fcallback"
      credentials: "test-token"
bindings:
  app0:
    type: mcp
    kind: client
    options:
      authorization:
        oauth: {}
    routes:
      - exit: net0
        with:
          headers:
            :scheme: http
            :authority: localhost
            :path: /mcp
