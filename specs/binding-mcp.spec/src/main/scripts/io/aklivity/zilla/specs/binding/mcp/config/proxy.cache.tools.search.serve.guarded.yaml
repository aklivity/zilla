---
name: test
guards:
  test0:
    type: test
    options:
      credentials: "hydrate-token"
stores:
  memory0:
    type: test
    options:
      entries:
        tools: |-
          {"tools":[{"name": "get_weather","title": "Weather Information Provider","description": "Get current weather information for a location","inputSchema": {"type": "object","properties": {"location": {"type": "string","description": "City name or zip code"}},"required": ["location"]},"icons": [{"src": "https://example.com/weather-icon.png","mimeType": "image/png","sizes": ["48x48"]}],"execution": {"taskSupport": "optional"}},{"name":"get_secret_report","description":"Get a confidential report","securitySchemes":[{"type":"oauth2","scopes":["report:read"]}]}]}
bindings:
  app0:
    type: mcp
    kind: proxy
    options:
      cache:
        store: memory0
        tools:
          search:
            toolkit: zilla
    routes:
      - exit: app1
        when:
          - toolkit: unused
        guarded:
          test0:
            - report:read
      - exit: app1
        when:
          - toolkit: misc
