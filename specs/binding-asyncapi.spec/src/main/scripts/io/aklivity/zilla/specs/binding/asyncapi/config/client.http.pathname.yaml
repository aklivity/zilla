---
name: test
catalogs:
  catalog0:
    type: test
    options:
      id: 1
      subject: petstore
      schema: |
        asyncapi: 3.0.0
        info:
          title: AsyncAPI Petstore
          license:
            name: MIT
          version: 1.0.0
        servers:
          plain:
            host: localhost:8080
            pathname: /v1
            protocol: http
            protocolVersion: '2.0'
        defaultContentType: application/json

        channels:
          pets:
            address: /pets
            messages:
              pet:
                $ref: '#/components/messages/pet'

        operations:
          createPets:
            action: send
            bindings:
              http:
                method: POST
            channel:
              $ref: '#/channels/pets'

        components:
          correlationIds:
            petsCorrelationId:
              location: '$message.header#/idempotency-key'
          schemas:
            petPayload:
              type: object
              properties:
                id:
                  type: integer
                  minimum: 0
                  description: Pet id.
                name:
                  type: string
                  description: Pet name.
                tag:
                  type: string
                  description: Tag.
          messages:
            pet:
              name: Pet
              title: Pet
              summary: >-
                Inform about Pet.
              contentType: application/json
              payload:
                $ref: '#/components/schemas/petPayload'
bindings:
  asyncapi0:
    type: asyncapi
    kind: client
    options:
      specs:
        http_api:
          server: http://localhost:8080
          catalog:
            catalog0:
              subject: petstore
              version: latest
