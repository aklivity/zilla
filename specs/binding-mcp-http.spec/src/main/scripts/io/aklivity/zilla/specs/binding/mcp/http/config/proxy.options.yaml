---
name: test
bindings:
  app0:
    type: mcp_http
    kind: proxy
    options:
      authorization:
        github0:
          credentials:
            headers:
              authorization: "Bearer ${credentials}"
      tools:
        create_pr:
          description: Create a pull request
          summary: "Created pull request #${result.number}"
          schemas:
            input:
              model: test
              catalog:
                catalog0:
                  - subject: create_pr_params
                    version: latest
            output:
              model: test
              catalog:
                catalog0:
                  - subject: create_pr_result
                    version: latest
      resources:
        order:
          uri: "order://{orderId}"
          description: Customer order by identifier
          mimeType: application/json
          schemas:
            output:
              model: test
              catalog:
                catalog0:
                  - subject: order_result
                    version: latest
    routes:
      - when:
          - tool: create_pr
        exit: http0
        with:
          headers:
            ":method": POST
            ":path": /repos/${args.owner}/${args.repo}/pulls
          body:
            model: test
            catalog:
              catalog0:
                - subject: create_pr_body
                  version: latest
      - when:
          - tool: remap_pr
        exit: http0
        with:
          headers:
            ":method": POST
            ":path": /repos/${args.owner}/${args.repo}/pulls
          body:
            template:
              title: "${args.title}"
      - when:
          - tool: search_code
        exit: http0
        with:
          headers:
            ":method": GET
            ":path": /search/code
          query:
            model: test
            catalog:
              catalog0:
                - subject: search_code_params
                  version: latest
      - when:
          - resource: order
        exit: http0
        with:
          headers:
            ":method": GET
            ":path": /orders/${params.orderId}
