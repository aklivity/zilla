---
name: test
catalogs:
  http_github0:
    type: inline
    options:
      subjects:
        create_pr_params:
          version: latest
          schema: |
            {
              "type": "object",
              "required": ["owner", "repo", "title", "pr"],
              "properties": {
                "owner": { "type": "string" },
                "repo":  { "type": "string" },
                "title": { "type": "string" },
                "pr": {
                  "type": "object",
                  "properties": {
                    "branch": { "type": "string" },
                    "target": { "type": "string" }
                  }
                }
              }
            }
        create_pr_result:
          version: latest
          schema: |
            {
              "type": "object",
              "properties": {
                "number":   { "type": "integer" },
                "html_url": { "type": "string" },
                "state":    { "type": "string" },
                "title":    { "type": "string" }
              }
            }
bindings:
  app0:
    type: mcp_http
    kind: proxy
    options:
      tools:
        create_pr:
          summary: "Created pull request #${result.number}"
          schemas:
            input:
              model: json
              catalog:
                http_github0:
                  - subject: create_pr_params
                    version: latest
            output:
              model: json
              catalog:
                http_github0:
                  - subject: create_pr_result
                    version: latest
    routes:
      - when:
          - tool: create_pr
        exit: http0
        with:
          headers:
            ":method": POST
            ":scheme": https
            ":authority": api.github.com
            ":path": /repos/${args.owner}/${args.repo}/pulls
          body:
            template:
              title: ${args.title}
              head: ${args.pr.branch}
              base: ${args.pr.target}
