---
name: test
catalogs:
  http_github0:
    type: inline
    options:
      subjects:
        echo_header_params:
          version: latest
          schema: |
            {
              "type": "object",
              "properties": {
                "requestId": { "type": "string" }
              }
            }
        echo_header_result:
          version: latest
          schema: |
            {
              "type": "object",
              "properties": {
                "status": { "type": "string" }
              }
            }
bindings:
  app0:
    type: mcp_http
    kind: proxy
    options:
      tools:
        echo_header:
          description: >
            Echo request, forwarding an optional caller-supplied request id as a header.
          summary: "done"
          schemas:
            input:
              model: json
              catalog:
                http_github0:
                  - subject: echo_header_params
                    version: latest
            output:
              model: json
              catalog:
                http_github0:
                  - subject: echo_header_result
                    version: latest
    routes:
      - when:
          - tool: echo_header
        exit: http0
        with:
          headers:
            ":method": GET
            ":scheme": https
            ":authority": api.github.com:443
            ":path": /echo
            "x-request-id": ${args.requestId}
