---
name: test
catalogs:
  http_github0:
    type: inline
    options:
      subjects:
        create_pr_params:
          version: latest
          schema: |
            {
              "type": "object",
              "required": ["owner", "repo", "title", "head", "base"],
              "properties": {
                "owner": { "type": "string" },
                "repo":  { "type": "string" },
                "title": { "type": "string" },
                "head":  { "type": "string" },
                "base":  { "type": "string" },
                "body":  { "type": "string" },
                "draft": { "type": "boolean" }
              }
            }
        create_pr_body:
          version: latest
          schema: |
            {
              "type": "object",
              "required": ["title", "head", "base"],
              "properties": {
                "title": { "type": "string" },
                "head":  { "type": "string" },
                "base":  { "type": "string" },
                "body":  { "type": "string" },
                "draft": { "type": "boolean" }
              }
            }
        create_pr_result:
          version: latest
          schema: |
            {
              "type": "object",
              "properties": {
                "number":   { "type": "integer" },
                "html_url": { "type": "string" },
                "state":    { "type": "string" },
                "title":    { "type": "string" }
              }
            }
        add_pr_comment_params:
          version: latest
          schema: |
            {
              "type": "object",
              "required": ["owner", "repo", "number", "message"],
              "properties": {
                "owner":   { "type": "string" },
                "repo":    { "type": "string" },
                "number":  { "type": "integer" },
                "message": { "type": "string" }
              }
            }
        add_pr_comment_result:
          version: latest
          schema: |
            {
              "type": "object",
              "properties": {
                "id":   { "type": "integer" },
                "body": { "type": "string" }
              }
            }
        search_code_params:
          version: latest
          schema: |
            {
              "type": "object",
              "required": ["q"],
              "properties": {
                "q":        { "type": "string" },
                "per_page": { "type": "integer" },
                "page":     { "type": "integer" }
              }
            }
        search_code_result:
          version: latest
          schema: |
            {
              "type": "object",
              "properties": {
                "total_count": { "type": "integer" },
                "items": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "properties": { "path": { "type": "string" } }
                  }
                }
              }
            }
        order_result:
          version: latest
          schema: |
            {
              "type": "object",
              "properties": {
                "id":     { "type": "string" },
                "status": { "type": "string" },
                "total":  { "type": "number" }
              }
            }
        report_params:
          version: latest
          schema: |
            {
              "type": "object",
              "properties": {}
            }
        report_result:
          version: latest
          schema: |
            {
              "type": "object",
              "properties": {
                "message": { "type": "string" }
              }
            }
        ping_params:
          version: latest
          schema: |
            {
              "type": "object",
              "properties": {}
            }
        ping_result:
          version: latest
          schema: |
            {
              "type": "object",
              "properties": {
                "status": { "type": "string" }
              }
            }
        list_tags_params:
          version: latest
          schema: |
            {
              "type": "object",
              "properties": {}
            }
        list_tags_result:
          version: latest
          schema: |
            {
              "type": "array",
              "items": { "type": "string" }
            }
        count_items_params:
          version: latest
          schema: |
            {
              "type": "object",
              "properties": {}
            }
        count_items_result:
          version: latest
          schema: |
            {
              "type": "integer"
            }
        echo_id_params:
          version: latest
          schema: |
            {
              "type": "object",
              "required": ["id"],
              "properties": {
                "id": { "type": "string" }
              }
            }
        echo_id_result:
          version: latest
          schema: |
            {
              "type": "object",
              "properties": {
                "status": { "type": "string" }
              }
            }
        profile_params:
          version: latest
          schema: |
            {
              "type": "object",
              "properties": {}
            }
        profile_result:
          version: latest
          schema: |
            {
              "type": "object",
              "properties": {
                "user": {
                  "type": "object",
                  "properties": {
                    "id":   { "type": "integer" },
                    "name": { "type": "string" }
                  }
                },
                "roles": {
                  "type": "array",
                  "items": { "type": "string" }
                },
                "active":  { "type": "boolean" },
                "manager": { "type": ["string", "null"] }
              }
            }
bindings:
  app0:
    type: mcp_http
    kind: proxy
    options:
      tools:
        create_pr:
          description: >
            Create a pull request to merge one branch into another.
            Use when proposing code changes for review.
          summary: "Created pull request #${result.number}"
          schemas:
            input:
              model: json
              catalog:
                http_github0:
                  - subject: create_pr_params
                    version: latest
            output:
              model: json
              catalog:
                http_github0:
                  - subject: create_pr_result
                    version: latest
        add_pr_comment:
          description: >
            Add a comment to a pull request.
          summary: "Commented: ${result.body}"
          schemas:
            input:
              model: json
              catalog:
                http_github0:
                  - subject: add_pr_comment_params
                    version: latest
            output:
              model: json
              catalog:
                http_github0:
                  - subject: add_pr_comment_result
                    version: latest
        search_code:
          description: >
            Search for code across repositories using code search syntax.
          summary: "Found ${result.total_count} matches"
          schemas:
            input:
              model: json
              catalog:
                http_github0:
                  - subject: search_code_params
                    version: latest
            output:
              model: json
              catalog:
                http_github0:
                  - subject: search_code_result
                    version: latest
        get_report:
          description: >
            Get a status report.
          summary: "Report: ${result.message}"
          schemas:
            input:
              model: json
              catalog:
                http_github0:
                  - subject: report_params
                    version: latest
            output:
              model: json
              catalog:
                http_github0:
                  - subject: report_result
                    version: latest
        ping:
          description: >
            Check service liveness.
          summary: "Status: ${result.status}"
          schemas:
            input:
              model: json
              catalog:
                http_github0:
                  - subject: ping_params
                    version: latest
            output:
              model: json
              catalog:
                http_github0:
                  - subject: ping_result
                    version: latest
        list_tags:
          description: >
            List repository tags.
          summary: "done"
          schemas:
            input:
              model: json
              catalog:
                http_github0:
                  - subject: list_tags_params
                    version: latest
            output:
              model: json
              catalog:
                http_github0:
                  - subject: list_tags_result
                    version: latest
        count_items:
          description: >
            Count items in the backlog.
          summary: "done"
          schemas:
            input:
              model: json
              catalog:
                http_github0:
                  - subject: count_items_params
                    version: latest
            output:
              model: json
              catalog:
                http_github0:
                  - subject: count_items_result
                    version: latest
        echo_id:
          description: >
            Echo the given identifier.
          summary: "Echoed: ${result.status}"
          schemas:
            input:
              model: json
              catalog:
                http_github0:
                  - subject: echo_id_params
                    version: latest
            output:
              model: json
              catalog:
                http_github0:
                  - subject: echo_id_result
                    version: latest
        get_profile:
          description: >
            Get the caller's profile.
          summary: "Profile for ${result.user.name}"
          schemas:
            input:
              model: json
              catalog:
                http_github0:
                  - subject: profile_params
                    version: latest
            output:
              model: json
              catalog:
                http_github0:
                  - subject: profile_result
                    version: latest
      resources:
        order:
          uri: "order://{orderId}"
          description: "Customer order by identifier"
          mimeType: application/json
          schemas:
            output:
              model: json
              catalog:
                http_github0:
                  - subject: order_result
                    version: latest
    routes:
      - when:
          - tool: create_pr
        exit: http0
        with:
          headers:
            ":method": POST
            ":scheme": https
            ":authority": api.github.com
            ":path": /repos/${args.owner}/${args.repo}/pulls
          body:
            model: json
            catalog:
              http_github0:
                - subject: create_pr_body
                  version: latest
      - when:
          - tool: add_pr_comment
        exit: http0
        with:
          headers:
            ":method": POST
            ":scheme": https
            ":authority": api.github.com
            ":path": /repos/${args.owner}/${args.repo}/issues/${args.number}/comments
          body:
            template:
              body: "${args.message}"
      - when:
          - tool: search_code
        exit: http0
        with:
          headers:
            ":method": GET
            ":scheme": https
            ":authority": api.github.com
            ":path": /search/code
          query:
            model: json
            catalog:
              http_github0:
                - subject: search_code_params
                  version: latest
      - when:
          - resource: order
        exit: http0
        with:
          headers:
            ":method": GET
            ":scheme": https
            ":authority": api.orders.internal
            ":path": /orders/${params.orderId}
      - when:
          - tool: get_report
        exit: http0
        with:
          headers:
            ":method": GET
            ":scheme": https
            ":authority": api.github.com
            ":path": /report
      - when:
          - tool: ping
        exit: http0
        with:
          headers:
            ":method": GET
            ":scheme": https
            ":authority": api.github.com
            ":path": /ping
      - when:
          - tool: list_tags
        exit: http0
        with:
          headers:
            ":method": GET
            ":scheme": https
            ":authority": api.github.com
            ":path": /tags
      - when:
          - tool: count_items
        exit: http0
        with:
          headers:
            ":method": GET
            ":scheme": https
            ":authority": api.github.com
            ":path": /count
      - when:
          - tool: echo_id
        exit: http0
        with:
          headers:
            ":method": POST
            ":scheme": https
            ":authority": api.github.com
            ":path": /echo/${args.id}
          body:
            model: json
            catalog:
              http_github0:
                - subject: echo_id_params
                  version: latest
      - when:
          - tool: get_profile
        exit: http0
        with:
          headers:
            ":method": GET
            ":scheme": https
            ":authority": api.github.com
            ":path": /profile
