---
name: test
guards:
  test0:
    type: test
    options:
      roles:
        - pr:write
  test1:
    type: test
    options:
      roles:
        - guest
bindings:
  app0:
    type: mcp_http
    kind: proxy
    options:
      tools:
        create_pr:
          description: Create a pull request
          summary: "Created pull request"
          schemas:
            input:
              model: test
      resources:
        settings:
          uri: "config://settings"
          description: Application settings
          mimeType: application/json
    routes:
      - guarded:
          test1:
            - admin
      - when:
          - tool: create_pr
        exit: http0
        guarded:
          test0:
            - pr:write
        with:
          headers:
            ":method": POST
            ":scheme": https
            ":authority": api.github.com:443
            ":path": /repos/acme/widget/pulls
      - when:
          - resource: settings
        exit: http0
        with:
          headers:
            ":method": GET
            ":scheme": https
            ":authority": api.example.internal:443
            ":path": /settings
