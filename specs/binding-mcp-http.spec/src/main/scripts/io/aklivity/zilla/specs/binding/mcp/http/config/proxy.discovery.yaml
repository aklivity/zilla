---
name: test
catalogs:
  test0:
    type: inline
    options:
      subjects:
        get_item_params:
          version: latest
          schema: |
            {"type":"object","properties":{"id":{"type":"string"}}}
        item_result:
          version: latest
          schema: |
            {"type":"object","properties":{"id":{"type":"string"}}}
bindings:
  app0:
    type: mcp_http
    kind: proxy
    options:
      tools:
        get_item:
          description: "Get an item"
          schemas:
            input:
              model: json
              catalog:
                test0:
                  - subject: get_item_params
                    version: latest
      resources:
        item:
          uri: "item://{itemId}"
          description: "An item resource"
          mimeType: application/json
          schemas:
            output:
              model: json
              catalog:
                test0:
                  - subject: item_result
                    version: latest
    routes:
      - when:
          - tool: get_item
        exit: http0
        with:
          headers:
            ":method": GET
            ":scheme": https
            ":authority": api.example.internal
            ":path": /items/${args.id}
      - when:
          - resource: item
        exit: http0
        with:
          headers:
            ":method": GET
            ":scheme": https
            ":authority": api.example.internal
            ":path": /items/${params.itemId}
