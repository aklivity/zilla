---
name: test
stores:
    memory0:
        type: memory
bindings:
    net0:
        type: test
        kind: server
        options:
            store: memory0
            assertions:
                store:
                    memory0:
                        - op: lock
                          key: lock.renewable
                          ttl: PT1M
                          expect: acquired
                        - op: renew
                          key: lock.renewable
                          ttl: PT1M
                          expect: renewed
                        - op: renew
                          key: lock.absent
                          value: any-token
                          expect: null
        routes:
            - exit: app0
