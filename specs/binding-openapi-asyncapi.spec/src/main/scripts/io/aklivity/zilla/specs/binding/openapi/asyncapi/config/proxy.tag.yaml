---
name: test
catalogs:
  catalog0:
    type: test
    options:
        id: 1
        subject: petstore
        schema: |
          openapi: "3.0.0"
          info:
            version: 1.0.0
            title: Swagger Petstore
            license:
              name: MIT
          servers:
            - url: http://localhost:9090/v1
          paths:
            /pets:
              get:
                summary: List all pets
                operationId: listPets
                tags:
                  - pets
                responses:
                  '200':
                    description: A paged array of pets
                    content:
                      application/json:
                        schema:
                          $ref: "#/components/schemas/Pets"
                  default:
                    description: unexpected error
                    content:
                      application/json:
                        schema:
                          $ref: "#/components/schemas/Error"
          components:
            schemas:
              Pet:
                type: object
                required:
                  - id
                  - name
                properties:
                  id:
                    type: integer
                    format: int64
                  name:
                    type: string
                  tag:
                    type: string
              Pets:
                type: array
                maxItems: 100
                items:
                  $ref: "#/components/schemas/Pet"
              Error:
                type: object
                required:
                  - code
                  - message
                properties:
                  code:
                    type: integer
                    format: int32
                  message:
                    type: string
  catalog1:
    type: test
    options:
      id: 2
      subject: petstore
      schema: |
        asyncapi: 3.0.0
        info:
          title: Petstore Kafka API
          version: 1.0.0
        defaultContentType: application/json
        servers:
          host-connections:
            host: 'localhost:9092'
            protocol: kafka-secure
            description: Test broker
        channels:
          petstore:
            address: 'petstore'
            messages:
              pet:
                $ref: '#/components/messages/pet'
            description: The topic on which pet values may be produced and consumed.
        operations:
          listPets:
            action: receive
            channel:
              $ref: '#/channels/petstore'
            summary: >-
              List all pets.
            tags:
              - name: pets
            messages:
              - $ref: '#/channels/petstore/messages/pet'
        components:
          messages:
            pet:
              name: Pet
              title: Pet
              summary: >-
                Inform about Pet.
              contentType: application/json
              payload:
                $ref: '#/components/schemas/petPayload'
          schemas:
            petPayload:
              type: object
              properties:
                id:
                  type: integer
                  minimum: 0
                  description: Pet id.
                name:
                  type: string
                  description: Pet name.

bindings:
  composite0:
    type: openapi-asyncapi
    kind: proxy
    options:
      specs:
        openapi:
          openapi-id:
            catalog:
              catalog0:
                subject: petstore
                version: latest
        asyncapi:
          asyncapi-id:
            catalog:
              catalog1:
                subject: petstore
                version: latest
    routes:
      - when:
          - spec: openapi-id
        exit: asyncapi_client0
        with:
          spec: asyncapi-id
          tag: pets
