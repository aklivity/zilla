---
name: test
catalogs:
  catalog0:
    type: test
    options:
      id: 1
      subject: petstore
      schema: |
        openapi: "3.0.0"
        info:
          version: 1.0.0
          title: Swagger Petstore
          license:
            name: MIT
        servers:
          - url: http://localhost:8080
        paths:
          /pets:
            get:
              summary: List all pets
              operationId: listPets
              tags:
                - pets
              responses:
                '200':
                  description: A paged array of pets
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/Pets"
        components:
          schemas:
            Pet:
              type: object
              required:
                - id
                - name
              properties:
                id:
                  type: integer
                  format: int64
                name:
                  type: string
            Pets:
              type: array
              maxItems: 100
              items:
                $ref: "#/components/schemas/Pet"
bindings:
  openapi0:
    type: openapi
    kind: client
    options:
      specs:
        petstore:
          catalog:
            catalog0:
              subject: petstore
              version: latest
      tcp:
        host: localhost
        port: 8080
    routes:
      - when:
          - spec: petstore
            operation: listPets
        exit: read_backend
