name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true

permissions:
  contents: write
  issues: read
  packages: write
  pull-requests: read

jobs:
  prepare:
    name: Prepare ${{ inputs.version }}
    runs-on: ubuntu-latest

    steps:
    - name: Restrict workflow to maintainers/admins
      uses: skjnldsv/check-actor-permission@v3.0
      with:
        require: admin

    - name: Validate release version against branch
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ inputs.version }}"
        REF="${{ github.ref_name }}"
        REPO="${{ github.repository }}"
        if [[ "$REF" == support/* ]]; then
          MAJOR="${REF#support/}"; MAJOR="${MAJOR%%.*}"
          if [[ "$VERSION" != "$MAJOR".* ]]; then
            echo "::error::Release version '$VERSION' is not part of the '$REF' line (expected ${MAJOR}.x). Aborting."
            exit 1
          fi
        elif [[ "$REF" == "develop" ]]; then
          MAJOR="${VERSION%%.*}"
          if git ls-remote --exit-code --heads \
               "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" \
               "support/${MAJOR}.x" >/dev/null 2>&1; then
            echo "::error::A 'support/${MAJOR}.x' branch exists; release version '$VERSION' from that branch, not develop. Aborting."
            exit 1
          fi
        fi

    - name: Cache Homebrew
      uses: actions/cache@v5
      with:
        path: /home/linuxbrew/.linuxbrew
        key: ${{ runner.os }}-homebrew

    - name: Install Homebrew
      run: |
        if ! command -v brew >/dev/null 2>&1; then
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        fi

        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        brew --version

    - name: Install git-flow AVH
      run: |
        git clone https://github.com/petervanderdoes/gitflow-avh.git
        cd gitflow-avh
        sudo make install

    - name: Configure git credentials
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global credential.helper store
        echo "https://x-access-token:${{ secrets.GITFLOW_RELEASES_TOKEN }}@github.com" > ~/.git-credentials

    - name: Checkout sources on base branch
      uses: actions/checkout@v7
      with:
        ref: ${{ github.ref_name }}
        fetch-depth: 0
        persist-credentials: false

    - name: Pin maven.packages.aklivity.io to IPv4
      run: |
        ipv4=$(getent ahostsv4 maven.packages.aklivity.io | awk 'NR==1{print $1}')
        if [ -n "$ipv4" ]; then
          echo "$ipv4 maven.packages.aklivity.io" | sudo tee -a /etc/hosts
        fi

    - name: Initialize GitFlow
      run: |
        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        git fetch origin main
        git branch main origin/main || true
        git fetch origin develop
        git branch develop origin/develop || true
        git flow init -df

    - name: Start GitFlow release
      run: |
        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        git flow release start ${{ inputs.version }} ${{ github.ref_name }}

    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        java-version: 25
        distribution: zulu

    - name: Update POM versions on release branch
      run: |
        ./mvnw org.codehaus.mojo:versions-maven-plugin:2.18.0:set -DgenerateBackupPoms=false -DnewVersion=${{ inputs.version }}

    - name: Cache gitflow-changelog events
      uses: actions/cache@v5
      with:
        path: .gitflow-changelog-cache.json
        key: gitflow-changelog-v3-${{ github.repository }}-${{ github.run_id }}
        restore-keys: |
          gitflow-changelog-v3-${{ github.repository }}-

    - name: Generate CHANGELOG on release branch
      id: changelog
      continue-on-error: true
      uses: aklivity/gitflow-changelog@v0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Warn if CHANGELOG generation failed on release branch
      if: steps.changelog.outcome == 'failure'
      run: echo "::warning::CHANGELOG generation failed on release/${{ inputs.version }}; release/${{ inputs.version }} will carry the previous CHANGELOG.md unchanged."

    - name: Commit POM versions and CHANGELOG on release branch
      run: git commit -a -m "Prepare release ${{ inputs.version }}"

    - name: No-merge release branch into base branch
      run: |
        git config merge.ours.driver true
        git fetch origin ${{ github.ref_name }}
        git checkout ${{ github.ref_name }}
        git merge -s ours release/${{ inputs.version }} \
            -m "No-merge release ${{ inputs.version }} into ${{ github.ref_name }}"

    - name: Push changes to base branch and release branch
      run: |
        git push origin ${{ github.ref_name }} release/${{ inputs.version }}

  deploy:
    name: Deploy ${{ inputs.version }}
    runs-on: ubuntu-latest
    needs: prepare

    steps:
    - name: Checkout GitHub sources
      uses: actions/checkout@v7
      with:
        ref: release/${{ inputs.version }}
        fetch-depth: 0

    - name: Pin maven.packages.aklivity.io to IPv4
      run: |
        ipv4=$(getent ahostsv4 maven.packages.aklivity.io | awk 'NR==1{print $1}')
        if [ -n "$ipv4" ]; then
          echo "$ipv4 maven.packages.aklivity.io" | sudo tee -a /etc/hosts
        fi

    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        java-version: 25
        distribution: zulu
        server-id: github
        server-username: GITHUB_ACTOR
        server-password: GITHUB_TOKEN

    - name: Route Docker Hub pulls through mirror.gcr.io
      run: |
        sudo mkdir -p /etc/docker
        if [ -f /etc/docker/daemon.json ]; then
          sudo jq '. + {"registry-mirrors": ["https://mirror.gcr.io"]}' /etc/docker/daemon.json > /tmp/daemon.json
        else
          echo '{"registry-mirrors": ["https://mirror.gcr.io"]}' > /tmp/daemon.json
        fi
        sudo mv /tmp/daemon.json /etc/docker/daemon.json
        sudo systemctl restart docker
        timeout 30 sh -c 'until docker info >/dev/null 2>&1; do sleep 1; done'

    - name: Create Maven cache key input
      run: |
        find . -name pom.xml -print0 \
          | sort -z \
          | xargs -0 sed -E '0,/<version>[^<]+<\/version>/s//<version>IGNORED<\/version>/' \
          > .maven-cache-key

    - name: Cache Maven packages
      uses: actions/cache@v5
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('.maven-cache-key') }}
        restore-keys: ${{ runner.os }}-m2-

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Determine docker tags
      id: tag
      run: |
        VERSION="${{ inputs.version }}"
        MAJOR=""
        MINOR=""
        LATEST=""
        if [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.[0-9]+$ ]]; then
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          HIGHEST=$({ git tag --list | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$'; echo "$VERSION"; } | sort -V | tail -n1)
          if [[ "$HIGHEST" == "$VERSION" ]]; then
            LATEST="latest"
          fi
        fi
        {
          echo "major=$MAJOR"
          echo "minor=$MINOR"
          echo "latest=$LATEST"
        } >> "$GITHUB_OUTPUT"

    - name: Deploy via Maven
      run: |
        ./mvnw -B -U -nsu -ntp clean deploy -Drelease -Ddocker.latest.tag=${{ steps.tag.outputs.latest }} -DskipTests
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Uncache Maven project release artifacts
      if: always()
      run: |
        GROUP_ID=`./mvnw help:evaluate -Dexpression=project.groupId -q -DforceStdout`
        rm -fr ~/.m2/repository/$(echo $GROUP_ID | tr . /)
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup buildx to publish multi-arch images
      run: |
        # The docker-container driver runs its own BuildKit instance that does
        # not inherit the daemon's registry-mirrors, so scope the mirror to
        # docker.io here too. ghcr.io is not matched and pulls direct.
        cat > /tmp/buildkitd.toml <<'EOF'
        [registry."docker.io"]
          mirrors = ["mirror.gcr.io"]
        EOF
        docker buildx create --driver docker-container --name release --use --config /tmp/buildkitd.toml

    - name: Extract docker build contexts
      run: |
        find cloud/docker-image/target/docker -name docker-build.tar -print0 | while IFS= read -r -d '' tar; do
          ctx="${tar%.tar}"
          rm -rf "$ctx" && mkdir -p "$ctx"
          tar -xf "$tar" -C "$ctx"
        done

    - name: Publish zilla image to GitHub Container Registry
      uses: docker/build-push-action@v7
      with:
        context: cloud/docker-image/target/docker/ghcr.io/aklivity/zilla/${{ inputs.version }}/tmp/docker-build
        platforms: linux/amd64,linux/arm64
        push: true
        provenance: false
        cache-from: type=registry,ref=ghcr.io/aklivity/zilla:buildcache
        cache-to: type=registry,ref=ghcr.io/aklivity/zilla:buildcache,mode=max
        tags: |
          ghcr.io/aklivity/zilla:${{ inputs.version }}
          ${{ steps.tag.outputs.minor && format('ghcr.io/aklivity/zilla:{0}', steps.tag.outputs.minor) || '' }}
          ${{ steps.tag.outputs.major && format('ghcr.io/aklivity/zilla:{0}', steps.tag.outputs.major) || '' }}
          ${{ steps.tag.outputs.latest && 'ghcr.io/aklivity/zilla:latest' || '' }}

    - name: Publish zilla-alpine image to GitHub Container Registry
      uses: docker/build-push-action@v7
      with:
        context: cloud/docker-image/target/docker/ghcr.io/aklivity/zilla/${{ inputs.version }}-alpine/tmp/docker-build
        file: cloud/docker-image/target/docker/ghcr.io/aklivity/zilla/${{ inputs.version }}-alpine/tmp/docker-build/alpine.Dockerfile
        platforms: linux/amd64
        push: true
        provenance: false
        cache-from: type=registry,ref=ghcr.io/aklivity/zilla:buildcache-alpine
        cache-to: type=registry,ref=ghcr.io/aklivity/zilla:buildcache-alpine,mode=max
        tags: |
          ghcr.io/aklivity/zilla:${{ inputs.version }}-alpine
          ${{ steps.tag.outputs.minor && format('ghcr.io/aklivity/zilla:{0}-alpine', steps.tag.outputs.minor) || '' }}
          ${{ steps.tag.outputs.major && format('ghcr.io/aklivity/zilla:{0}-alpine', steps.tag.outputs.major) || '' }}
          ${{ steps.tag.outputs.latest && 'ghcr.io/aklivity/zilla:alpine' || '' }}

    - name: Setup helm
      uses: azure/setup-helm@v5

    - name: Publish zilla chart to GitHub Container Registry
      run: |
        helm push cloud/helm-chart/target/helm/repo/zilla-${{ inputs.version }}.tgz oci://ghcr.io/aklivity/charts

  finalize:
    name: Finalize ${{ inputs.version }}
    runs-on: ubuntu-latest
    needs: deploy

    steps:
    - name: Cache Homebrew
      uses: actions/cache@v5
      with:
        path: /home/linuxbrew/.linuxbrew
        key: ${{ runner.os }}-homebrew

    - name: Install Homebrew
      run: |
        if ! command -v brew >/dev/null 2>&1; then
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        fi

        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        brew --version

    - name: Install git-flow AVH
      run: |
        git clone https://github.com/petervanderdoes/gitflow-avh.git
        cd gitflow-avh
        sudo make install

    - name: Configure git credentials
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global credential.helper store
        echo "https://x-access-token:${{ secrets.GITFLOW_RELEASES_TOKEN }}@github.com" > ~/.git-credentials

    - name: Checkout GitHub sources on release branch
      uses: actions/checkout@v7
      with:
        ref: release/${{ inputs.version }}
        fetch-depth: 0
        persist-credentials: false

    - name: Initialize GitFlow
      run: |
        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        git fetch origin main
        git branch main origin/main || true
        git fetch origin develop
        git branch develop origin/develop || true
        git fetch origin ${{ github.ref_name }}
        git branch ${{ github.ref_name }} origin/${{ github.ref_name }} || true
        git flow init -df

    - name: Tag the release
      if: startsWith(github.ref_name, 'support/')
      run: |
        git tag -a ${{ inputs.version }} -m "${{ inputs.version }}" release/${{ inputs.version }}
        git push origin refs/tags/${{ inputs.version }}

    - name: Finish release
      run: |
        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        git config --local "gitflow.branch.release/${{ inputs.version }}.base" ${{ github.ref_name }}
        if [[ "${{ github.ref_name }}" == support/* ]]; then
          git flow release finish -p -n ${{ inputs.version }}
        else
          git flow release finish -p ${{ inputs.version }} -m "${{ inputs.version }}"
        fi

    - name: Checkout base branch for CHANGELOG
      run: |
        git fetch origin ${{ github.ref_name }}
        git checkout ${{ github.ref_name }}

    - name: Cache gitflow-changelog events
      uses: actions/cache@v5
      with:
        path: .gitflow-changelog-cache.json
        key: gitflow-changelog-v3-${{ github.repository }}-${{ github.run_id }}
        restore-keys: |
          gitflow-changelog-v3-${{ github.repository }}-

    - name: Generate CHANGELOG on base branch
      id: changelog
      continue-on-error: true
      uses: aklivity/gitflow-changelog@v0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Warn if CHANGELOG generation failed on base branch
      if: steps.changelog.outcome == 'failure'
      run: echo "::warning::CHANGELOG generation failed on ${{ github.ref_name }}; the release itself (tag, merge) already completed successfully — rerun CHANGELOG generation manually or it will catch up next release."

    - name: Commit and push CHANGELOG on base branch (if needed)
      run: |
        git diff --quiet && git diff --cached --quiet || git commit -a -m "Update CHANGELOG.md"
        git push origin ${{ github.ref_name }}
