version: 2
updates:
# ---------------------------------------------------------
# DEFAULT BRANCH (develop)
# ---------------------------------------------------------
- package-ecosystem: maven
  directory: /
  ignore:
    - dependency-name: "org.kaazing:k3po.*"
      versions: [ "4.x", "5.x" ]
    - dependency-name: "com.guicedee.services:commons-*"
      versions: [ "62" ]
    - dependency-name: "org.slf4j:slf4j-*"
      versions: [ "2.x" ]
  schedule:
    interval: daily
- package-ecosystem: docker
  directory: /cloud/docker-image/src/main/docker
  schedule:
    interval: daily
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: daily
# ---------------------------------------------------------
# SUPPORT BRANCH (support/1.x)
# ---------------------------------------------------------
- package-ecosystem: maven
  target-branch: "support/1.x"
  directory: /
  ignore:
    - dependency-name: "org.kaazing:k3po.*"
      versions: [ "4.x", "5.x" ]
    - dependency-name: "com.guicedee.services:commons-*"
      versions: [ "62" ]
    - dependency-name: "org.slf4j:slf4j-*"
      versions: [ "2.x" ]
    - dependency-name: "org.eclipse:yasson"
      versions: [ "3.x" ]
  schedule:
    interval: daily
- package-ecosystem: docker
  target-branch: "support/1.x"
  directory: /cloud/docker-image/src/main/docker
  schedule:
    interval: daily
- package-ecosystem: github-actions
  target-branch: "support/1.x"
  directory: /
  schedule:
    interval: daily
