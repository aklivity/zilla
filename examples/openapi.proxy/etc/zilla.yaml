---
name: zilla-openapi-proxy
catalogs:
  host_filesystem:
    type: filesystem
    options:
      subjects:
        petstore:
          path: specs/petstore-openapi.yaml
bindings:
  north_openapi_server:
    type: openapi
    kind: server
    options:
      specs:
        my-openapi-spec:
          servers:
            - http://localhost:7114
          catalog:
            host_filesystem:
              subject: petstore
    exit: south_openapi_client
  south_openapi_client:
    type: openapi
    kind: client
    options:
      specs:
        my-openapi-spec:
          servers:
            - http://openapi-mock:5000
          catalog:
            host_filesystem:
              subject: petstore
telemetry:
  exporters:
    stdout_logs_exporter:
      type: stdout
