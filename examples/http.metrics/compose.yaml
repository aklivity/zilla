name: ${NAMESPACE:-zilla-http-metrics}
services:
  zilla:
    image: ghcr.io/aklivity/zilla:${ZILLA_VERSION:-latest}
    restart: unless-stopped
    hostname: zilla.examples.dev
    ports:
      - 7114:7114
      - 7190:7190
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
      test: ["CMD", "sh", "-c", "/opt/zilla/zilla logs | grep -q engine.started"]
    environment:
      ZILLA_INCUBATOR_ENABLED: "true"
    volumes:
      - ./etc:/etc/zilla
    command: start -v -e

networks:
  default:
    driver: bridge
