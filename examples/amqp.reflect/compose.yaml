name: ${NAMESPACE:-zilla-amqp-reflect}
services:
  zilla:
    image: ghcr.io/aklivity/zilla:${ZILLA_VERSION:-latest}
    restart: unless-stopped
    hostname: zilla.examples.dev
    ports:
      - 7172:7172
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
      test: ["CMD", "sh", "-c", "test -f /var/run/zilla/ready"]
    environment:
      ZILLA_INCUBATOR_ENABLED: "true"
    volumes:
      - ./etc:/etc/zilla
    command: start -v -e

  cli-rhea:
    image: kornysd/cli-rhea
    tty: true
    stdin_open: true

networks:
  default:
    driver: bridge
