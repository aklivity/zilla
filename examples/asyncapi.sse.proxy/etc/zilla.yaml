---
name: zilla-asyncapi-sse-proxy
catalogs:
  host_filesystem:
    type: filesystem
    options:
      subjects:
        eventstore:
          path: specs/sse-asyncapi.yaml
bindings:
  sse_proxy_server:
    type: asyncapi
    kind: server
    options:
      specs:
        my-asyncapi-spec:
          server: http://localhost:7114
          catalog:
            host_filesystem:
              subject: eventstore
    exit: sse_proxy_client
  sse_proxy_client:
    type: asyncapi
    kind: client
    options:
      specs:
        my-asyncapi-spec:
          server: http://${{env.SSE_SERVER_HOST}}:${{env.SSE_SERVER_PORT}}
          catalog:
            host_filesystem:
              subject: eventstore
telemetry:
  exporters:
    stdout_logs_exporter:
      type: stdout
