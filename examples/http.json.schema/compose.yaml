name: ${NAMESPACE:-zilla-http-json-schema}
services:
  zilla:
    image: ghcr.io/aklivity/zilla:${ZILLA_VERSION:-1}
    restart: unless-stopped
    hostname: zilla.examples.dev
    ports:
      - 7114:7114
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
      test: ["CMD", "sh", "-c", "test -f /var/run/zilla/ready"]
    environment:
      ZILLA_INCUBATOR_ENABLED: "true"
    volumes:
      - ./etc:/etc/zilla
    command: start -v -e

  nginx:
    image: nginx:stable
    restart: unless-stopped
    ports:
      - 80:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./www:/usr/share/nginx/html

networks:
  default:
    driver: bridge
