---
name: zilla-mqtt-kafka-broker
catalogs:
  host_filesystem:
    type: filesystem
    options:
      subjects:
        smartylighting:
          path: specs/mqtt-asyncapi.yaml
bindings:
  mqtt_proxy_server:
    type: asyncapi
    kind: server
    options:
      specs:
        my-asyncapi-spec:
          servers:
            - mqtt://localhost:7183
          catalog:
            host_filesystem:
              subject: smartylighting
    exit: mqtt_proxy_client
  mqtt_proxy_client:
    type: asyncapi
    kind: client
    options:
      specs:
        my-asyncapi-spec:
          servers:
            - mqtt://${{env.MOSQUITTO_BROKER_HOST}}:${{env.MOSQUITTO_BROKER_PORT}}
          catalog:
            host_filesystem:
              subject: smartylighting
telemetry:
  exporters:
    stdout_logs_exporter:
      type: stdout
