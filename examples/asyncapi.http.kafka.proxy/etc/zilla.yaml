---
name: zilla-http-kafka-asyncapi
catalogs:
  host_filesystem:
    type: filesystem
    options:
      subjects:
        http:
          path: specs/http-asyncapi.yaml
        kafka:
          path: specs/kafka-asyncapi.yaml
bindings:
  north_http_server:
    type: asyncapi
    kind: server
    options:
      specs:
        http_api:
          servers:
            - http://localhost:7114
          catalog:
            host_filesystem:
              subject: http
    exit: south_kafka_proxy
  south_kafka_proxy:
    type: asyncapi
    kind: proxy
    options:
      specs:
        http_api:
          servers:
            - http://localhost:7114
          catalog:
            host_filesystem:
              subject: http
        kafka_api:
          servers:
            - kafka://kafka.examples.dev:29092
          catalog:
            host_filesystem:
              subject: kafka
    routes:
      - when:
          - spec: http_api
            operation: createPets
        exit: south_kafka_client
        with:
          spec: kafka_api
          operation: addPet
      - when:
          - spec: http_api
        exit: south_kafka_client
        with:
          spec: kafka_api
  south_kafka_client:
    type: asyncapi
    kind: client
    options:
      specs:
        kafka_api:
          servers:
            - kafka://kafka.examples.dev:29092
          catalog:
            host_filesystem:
              subject: kafka
telemetry:
  exporters:
    stdout_exporter:
      type: stdout
