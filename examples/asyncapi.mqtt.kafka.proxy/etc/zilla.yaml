---
name: zilla-mqtt-kafka-broker
catalogs:
  host_filesystem:
    type: filesystem
    options:
      subjects:
        mqtt:
          path: specs/mqtt-asyncapi.yaml
        kafka:
          path: specs/kafka-asyncapi.yaml
bindings:
  north_mqtt_server:
    type: asyncapi
    kind: server
    options:
      specs:
        mqtt_api:
          catalog:
            host_filesystem:
              subject: mqtt
    exit: south_kafka_proxy
  south_kafka_proxy:
    type: asyncapi
    kind: proxy
    options:
      specs:
        mqtt_api:
          catalog:
            host_filesystem:
              subject: mqtt
        kafka_api:
          catalog:
            host_filesystem:
              subject: kafka
    routes:
      - when:
          - spec: mqtt_api
            operation: turnOn
        exit: south_kafka_client
        with:
          spec: kafka_api
          operation: toStreetlightData
      - when:
          - spec: mqtt_api
            operation: receiveLightMeasurement
        exit: south_kafka_client
        with:
          spec: kafka_api
          operation: onStreetlightData
      - when:
          - spec: mqtt_api
            operation: sendLightMeasurement
        exit: south_kafka_client
        with:
          spec: kafka_api
          operation: toStreetlightData
      - when:
          - spec: mqtt_api
            operation: turnOff
        exit: south_kafka_client
        with:
          spec: kafka_api
          operation: toStreetlightData
      - when:
          - spec: mqtt_api
            operation: dimLight
        exit: south_kafka_client
        with:
          spec: kafka_api
          operation: toStreetlightData
  south_kafka_client:
    type: asyncapi
    kind: client
    options:
      specs:
        kafka_api:
          catalog:
            host_filesystem:
              subject: kafka
telemetry:
  exporters:
    stdout_logs_exporter:
      type: stdout
