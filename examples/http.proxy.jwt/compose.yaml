name: ${NAMESPACE:-zilla-http-proxy-jwt}
services:
  zilla:
    image: ghcr.io/aklivity/zilla:${ZILLA_VERSION:-latest}
    restart: unless-stopped
    hostname: zilla.examples.dev
    ports:
      - 7114:7114
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
      test: ["CMD", "sh", "-c", "/opt/zilla/zilla logs | grep -q engine.started"]
    environment:
      ZILLA_INCUBATOR_ENABLED: "true"
    volumes:
      - ./etc:/etc/zilla
    command: start -v -e

  jwt-cli:
    image: bitnamilegacy/jwt-cli
    stdin_open: true
    tty: true
    profiles:
      - on-demand
    volumes:
      - ./private.pem:/private.pem

networks:
  default:
    driver: bridge
